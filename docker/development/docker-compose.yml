version: '3.8'

services:
  frontend:
    build:
      context: ../../packages/frontend
      dockerfile: ../../docker/development/Dockerfile.frontend
    environment:
      - REGION=${REGION:-default}
      - CURRENCY=${CURRENCY:-USD}
      - LANGUAGE=${LANGUAGE:-en}
      - API_URL=${API_URL:-http://localhost:5002}
      - API_PORT=5002
    ports:
      - "3000:3000"
    volumes:
      - ../../packages/frontend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build:
      context: ../../packages/api
      dockerfile: ../../docker/development/Dockerfile.api
    environment:
      - DB_USER=${DB_USER:?Set DB_USER in .env}
      - DB_PASSWORD=${DB_PASSWORD:?Set DB_PASSWORD in .env}
      - DB_NAME=${DB_NAME:-jobplatform}
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-jobplatform}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - NODE_ENV=development
      - NODE_OPTIONS=--openssl-legacy-provider
      - PORT=5000
      - REGION_SPECIFIC_CONFIG=/app/config/${REGION:-default}.json
    ports:
      - "5002:5000"
    volumes:
      - ../../packages/api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=${DB_USER:?Set DB_USER in .env}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?Set DB_PASSWORD in .env}
      - POSTGRES_DB=${DB_NAME:-jobplatform}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-jobplatform}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:?Set PGADMIN_EMAIL in .env}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:?Set PGADMIN_PASSWORD in .env}
    ports:
      - "5052:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

# docker-compose.yml
# Local development & testing stack for job-platform-template
# 
# Usage:
#   docker-compose up -d        # Start all services
#   docker-compose logs -f      # View logs
#   docker-compose down -v      # Stop and remove volumes
#
# Access:
#   Frontend: http://localhost:3000
#   API:      http://localhost:5000
#   pgAdmin:  http://localhost:5050 (credentials from .env)

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: jobplatform-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:?Set DB_USER in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-jobplatform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobplatform

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: jobplatform-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      
      # Database
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME:-jobplatform}
      
      # Auth
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      
      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      
      # Site Configuration
      SITE_NAME: ${SITE_NAME:-Job Platform}
      SITE_TAGLINE: ${SITE_TAGLINE:-Find Your Dream Job}
      SITE_DOMAIN: ${SITE_DOMAIN:-localhost}
      LOGO_URL: ${LOGO_URL:-/logo.svg}
      PRIMARY_COLOR: ${PRIMARY_COLOR:-#2563EB}
      SECONDARY_COLOR: ${SECONDARY_COLOR:-#10B981}
      
      # Localization
      CURRENCY: ${CURRENCY:-USD}
      CURRENCY_SYMBOL: ${CURRENCY_SYMBOL:-$}
      
      # Features
      STRIPE_ENABLED: ${STRIPE_ENABLED:-false}
      FEED_INGEST_ENABLED: ${FEED_INGEST_ENABLED:-true}
      
      # Frontend URL (for CORS)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    command: sh -c "npx prisma migrate deploy && npm run dev"
    networks:
      - jobplatform

  # Frontend
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile.dev
    container_name: jobplatform-frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
      VITE_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    volumes:
      - ./packages/frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: npm run dev -- --host 0.0.0.0
    networks:
      - jobplatform

  # pgAdmin (optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: jobplatform-pgadmin
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:?Set PGADMIN_EMAIL in .env}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?Set PGADMIN_PASSWORD in .env}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - jobplatform

  # Redis (for sessions/caching - optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: jobplatform-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jobplatform

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:

networks:
  jobplatform:
    driver: bridge
